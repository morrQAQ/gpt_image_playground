server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;
    auth_basic ${AUTH_BASIC_REALM};
    auth_basic_user_file ${AUTH_BASIC_USER_FILE};

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    location /api-proxy/ {
        limit_except POST OPTIONS {
            deny all;
        }

        set $allow_proxy 0;
        if ($uri ~* ^/api-proxy/((v1/)?(images/generations|images/edits|responses))$) {
            set $allow_proxy 1;
        }
        if ($allow_proxy = 0) {
            return 403 "Forbidden: API Proxy path restricted";
        }

        proxy_pass ${API_PROXY_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization ${API_PROXY_AUTH_HEADER};
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
        proxy_send_timeout ${API_PROXY_SEND_TIMEOUT};
        proxy_read_timeout ${API_PROXY_READ_TIMEOUT};
        proxy_request_buffering off;
        proxy_buffering off;
    }
    # END API PROXY

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
